<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuildFast | Marketplace</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="page-shell">
  <header class="site-header" data-site-header></header>
  <main>
    <div class="section-head">
      <div><div class="pill">Marketplace</div><h2>Browse construction materials.</h2></div>
      <p data-result-count>Loading materials...</p>
    </div>
    <section class="market-toolbar">
      <input class="search-input" type="search" data-search placeholder="Search cement, steel, tiles, tools..." />
      <div class="chip-row" data-category-chips></div>
    </section>
    <section class="product-grid" data-product-grid></section>
  </main>
  <script type="module" src="./js/marketplace.js"></script>
</body>
</html>
